# Baseline RAG Configuration

system: baseline

# --- Text Extraction ---
extraction:
  engine: pymupdf   # fitz

# --- Chunking ---
chunking:
  chunk_size: 800        # characters (not tokens — use as proxy)
  overlap: 120
  split_by: characters

# --- Embedding ---
embedding:
  model: all-MiniLM-L6-v2
  normalize: true
  batch_size: 32

# --- Retrieval ---
retrieval:
  top_k: [1, 3, 5, 10]
  similarity: cosine
  mode: baseline          # "baseline" | "linked"

# --- Paths ---
paths:
  raw_pdfs: data/raw_pdfs/
  extracted_text: data/extracted_text/
  index: data/results/baseline_index.json
